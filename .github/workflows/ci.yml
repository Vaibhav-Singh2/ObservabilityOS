name: ObservabilityOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    env:
      MONGODB_URI: mongodb://localhost:27017/observability_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: super_secure_ci_jwt_secret_999

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Project
        run: yarn build

      - name: Run Code Format Check
        run: yarn format --check || echo "Prettier formatting warnings found"

      - name: Run Linting
        run: yarn lint

      - name: Run Type Checks
        run: yarn check-types

      - name: Run Vitest Suite (Unit, Integration, DB, Security, Contract, SDK, AI)
        run: yarn test

      - name: Run Coverage Report
        run: yarn test:coverage

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E Tests
        run: npx playwright test
        working-directory: apps/web
